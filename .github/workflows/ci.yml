name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  phpcs:
    name: PHP CodeSniffer
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Validate platform requirements
        run: composer check-platform-reqs --no-dev

      - name: Run PHPCS
        run: vendor/bin/phpcs --standard=Drupal web/modules/custom/

  phpunit:
    name: PHPUnit (Kernel tests)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal
          MARIADB_USER: drupal
          MARIADB_PASSWORD: drupal
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql, gd, opcache
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Validate platform requirements
        run: composer check-platform-reqs --no-dev

      - name: Run Kernel tests
        env:
          SIMPLETEST_BASE_URL: "http://localhost"
          SIMPLETEST_DB: "mysql://drupal:drupal@127.0.0.1/drupal"
          BROWSERTEST_OUTPUT_DIRECTORY: "/tmp/browser_output"
          SYMFONY_DEPRECATIONS_HELPER: "disabled"
        run: |
          vendor/bin/phpunit \
            --testsuite=store_fulfillment \
            --filter="Kernel" \
            --colors=never \
            2>&1
