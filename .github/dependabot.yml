version: 2
updates:
  # Composer (PHP) — security updates only.
  # Opens a PR per vulnerable package when a CVE is published.
  # Version-bump PRs (non-security) are deliberately omitted to reduce noise.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Drupal core: update via drupal.org security advisories + composer update,
      # not via automated PRs that could bypass the Drupal config management gate.
      - dependency-name: "drupal/core"
      - dependency-name: "drupal/core-recommended"
      - dependency-name: "drupal/core-composer-scaffold"
