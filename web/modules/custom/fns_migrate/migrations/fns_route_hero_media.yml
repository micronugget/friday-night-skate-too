id: fns_route_hero_media
label: 'FNS: Legacy route hero images → media/image'
migration_group: fns

# Pulls the og:image URL from each legacy route page and creates a managed
# File + a media/image entity referencing it. The detail-page parsing is
# delegated to the shared `fns_route_html` source plugin so we never have to
# re-implement OG-image extraction.
source:
  plugin: fns_route_html
  base_url: 'https://fridaynightskate.com'
  index_path: /routes
  page_query: page
  first_page: 1
  max_pages: 50
  constants:
    destination_dir: 'public://routes/hero/'
    extension: '.jpg'

process:
  _skip_no_hero:
    plugin: skip_on_empty
    method: row
    source: hero_image_url

  # `private://` would hide hero images from anonymous visitors; the legacy
  # site serves them publicly and we keep that contract.
  _uri:
    plugin: concat
    source:
      - constants/destination_dir
      - slug
      - constants/extension

  bundle:
    plugin: default_value
    default_value: image

  name: title

  # Download the og:image into `public://routes/hero/<slug>.jpg` and return
  # the resulting file id so it can be assigned to the media image field.
  'field_media_image/target_id':
    plugin: file_import
    source: hero_image_url
    destination: '@_uri'
    file_exists: replace
    reuse: true
    id_only: true

  'field_media_image/alt': title

  status:
    plugin: default_value
    default_value: 1

destination:
  plugin: 'entity:media'
  default_bundle: image

migration_dependencies:
  required: []
  optional: []
