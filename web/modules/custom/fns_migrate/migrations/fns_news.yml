id: fns_news
label: 'FNS: Legacy news → node/news'
migration_group: fns
source:
  plugin: fns_news_html
  base_url: 'https://fridaynightskate.com'
  index_path: /news
  page_query: page
  first_page: 1
  max_pages: 50
process:
  title: title
  field_legacy_id: id
  field_legacy_url: url
  body/value:
    plugin: absolute_url_to_internal
    source: body_html
  body/format:
    plugin: default_value
    default_value: basic_html
destination:
  plugin: entity:node
  default_bundle: news
migration_dependencies:
  required: []
  optional: []
