id: fns_page
label: 'FNS: Legacy pages → node/page'
migration_group: fns

source:
  plugin: fns_page_html
  base_url: 'https://fridaynightskate.com'
  index_path: /pages
  page_query: page
  first_page: 1
  max_pages: 50

process:
  title: title
  field_legacy_id: id
  field_legacy_url: url
  body/value: body_html
  body/format:
    plugin: default_value
    default_value: basic_html

destination:
  plugin: entity:node
  default_bundle: page

migration_dependencies:
  required: []
  optional: []
