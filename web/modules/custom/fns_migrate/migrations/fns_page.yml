id: fns_page
label: 'FNS: Legacy pages → node/page'
migration_group: fns
source:
  plugin: fns_page_html
  base_url: 'https://fridaynightskate.com'
  slugs:
    - about
    - contact
    - faq
    - privacy
    - safety
    - specials
    - sponsors
process:
  title: title
  field_legacy_id: id
  field_legacy_url: url
  body/value:
    plugin: absolute_url_to_internal
    source: body_html
  body/format:
    plugin: default_value
    default_value: basic_html
destination:
  plugin: entity:node
  default_bundle: page
migration_dependencies:
  required: []
  optional: []
