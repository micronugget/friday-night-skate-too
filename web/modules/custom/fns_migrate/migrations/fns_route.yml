id: fns_route
label: 'FNS: Legacy routes → node/route'
migration_group: fns

source:
  plugin: fns_route_html
  base_url: 'https://fridaynightskate.com'
  index_path: /routes
  page_query: page
  first_page: 1
  max_pages: 50

process:
  title: title
  field_legacy_id: id
  field_legacy_url: url
  field_distance_km: distance_km
  field_difficulty: difficulty
  body/value: body_html
  body/format:
    plugin: default_value
    default_value: basic_html

destination:
  plugin: entity:node
  default_bundle: route

migration_dependencies:
  required: []
  optional: []
