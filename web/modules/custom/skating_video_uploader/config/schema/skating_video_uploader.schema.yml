skating_video_uploader.settings:
  type: config_object
  label: 'Skating Video Uploader settings'
  mapping:
    youtube_client_id:
      type: string
      label: 'YouTube OAuth Client ID'
    youtube_client_secret:
      type: string
      label: 'YouTube OAuth Client Secret'
    youtube_redirect_uri:
      type: string
      label: 'YouTube OAuth Redirect URI'
    youtube_access_token:
      type: string
      label: 'YouTube OAuth Access Token'
    youtube_refresh_token:
      type: string
      label: 'YouTube OAuth Refresh Token'
    metadata_consent_text:
      type: text
      label: 'Metadata consent text'
